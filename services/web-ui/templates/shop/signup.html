{% extends "base.html" %}
{% load static %}

{% block title %}Créer un compte{% endblock %}

{% block extra_css %}
<style>
  .signup-hero {
    background: linear-gradient(135deg, var(--green-light) 0%, #fff 100%);
    border-radius: 28px;
    padding: 2rem;
    margin: 1rem 0;
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
  }
  .signup-panel {
    max-width: 480px;
    margin: 0 auto;
    background: white;
    border-radius: 28px;
    padding: 2rem;
    box-shadow: 0 20px 35px -12px rgba(46,125,50,0.2);
    border: 1px solid var(--border);
  }
  .signup-panel h1 {
    font-size: 1.8rem;
    margin: 0 0 0.5rem;
    text-align: center;
  }
  .signup-panel .sub {
    text-align: center;
    margin-bottom: 1.5rem;
    color: var(--muted);
  }
  .signup-panel input {
    width: 100%;
    padding: 0.8rem 1rem;
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 1rem;
    transition: 0.2s;
  }
  .signup-panel input:focus {
    outline: none;
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(46,125,50,0.1);
  }
  .signup-panel button {
    width: 100%;
    margin-top: 1rem;
  }
  .form-group {
    margin-bottom: 1rem;
  }
  .form-group label {
    display: block;
    margin-bottom: 0.25rem;
    font-weight: 500;
  }
  .help-text {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 0.25rem;
  }
</style>
{% endblock %}

{% block content %}
<div class="signup-hero">
  <div class="signup-panel">
    <h1>Créer un compte</h1>
    <div class="sub">Rejoignez MarketPharm en quelques secondes</div>
    <form method="post" class="stack">
      {% csrf_token %}
      <div class="form-group">
        <label>Nom complet</label>
        <input type="text" name="full_name" required placeholder="Jean Dupont">
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" name="email" required autocomplete="email" placeholder="jean@exemple.com">
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" name="password" required placeholder="••••••••">
      </div>
      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <input type="password" name="password2" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn-primary full">Créer mon compte</button>
    </form>
    <div style="text-align: center; margin-top: 1.5rem;">
      <span class="muted">Vous avez déjà un compte ?</span>
      <a href="{% url 'login' %}">Connectez-vous</a>
    </div>
  </div>
</div>
{% endblock %}
