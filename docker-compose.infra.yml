# docker-compose.infra.yml
# PC Infrastructure : Traefik + PostgreSQL + RabbitMQ + Consul
# ============================================================
# À lancer sur le PC qui aura l'infrastructure partagée
# Ce PC doit être démarré en premier

version: '3.8'

services:
  traefik:
    image: traefik:v2.11
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "8081:80"
      - "8082:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - pharm-infra

  consul:
    image: hashicorp/consul:1.17
    command: agent -dev -client=0.0.0.0 -ui
    ports:
      - "8501:8500"
    networks:
      - pharm-infra

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbitmq_secure}
    networks:
      - pharm-infra

  postgres-auth:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: ${POSTGRES_AUTH_PASSWORD:-auth_secure}
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - pg_auth:/var/lib/postgresql/data
    networks:
      - pharm-infra

  postgres-catalog:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: ${POSTGRES_CATALOG_PASSWORD:-catalog_secure}
      POSTGRES_DB: catalog_db
    ports:
      - "5433:5432"
    volumes:
      - pg_catalog:/var/lib/postgresql/data
    networks:
      - pharm-infra

networks:
  pharm-infra:
    driver: bridge

volumes:
  pg_auth:
  pg_catalog: