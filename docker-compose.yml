# MarketPharm-style marketplace — distributed master configuration
services:
  traefik:
    image: traefik:v2.11
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.consulcatalog=true
      - --providers.consulcatalog.endpoint.address=${MASTER_IP}:8501
      - --entrypoints.web.address=:80
      - --log.level=DEBUG
    ports:
      - "8081:80"
      - "8082:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - pharm

  consul:
    image: hashicorp/consul:1.17
    command: agent -dev -client=0.0.0.0 -ui
    ports:
      - "8501:8500"
    networks:
      - pharm

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    networks:
      - pharm

  postgres-auth:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: auth_db
    ports:
      - "5434:5432"
    volumes:
      - pg_auth:/var/lib/postgresql/data
    networks:
      - pharm

  postgres-catalog:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
      POSTGRES_DB: catalog_db
    ports:
      - "5435:5432"
    volumes:
      - pg_catalog:/var/lib/postgresql/data
    networks:
      - pharm

  auth_service:
    build:
      context: .
      dockerfile: auth_service/Dockerfile
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: postgres://auth:auth@${MASTER_IP}:5434/auth_db
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-auth}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-shared-jwt-secret-change-in-prod}
      CONSUL_HTTP_ADDR: http://${MASTER_IP}:8501
      SERVICE_NAME: auth-service
      SERVICE_PORT: "8000"
      SERVICE_ADDRESS: ${MY_IP}
    volumes:
      - ./auth_service:/app
    networks:
      - pharm
    labels:
      - traefik.enable=true
      - traefik.http.routers.pharm-auth.rule=Host(`auth.localhost`) || Host(`auth.localhost:8081`)
      - traefik.http.routers.pharm-auth.entrypoints=web
      - traefik.http.services.pharm-auth.loadbalancer.server.port=8000

  catalog_service:
    build:
      context: .
      dockerfile: catalog_service/Dockerfile
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: postgres://catalog:catalog@${MASTER_IP}:5435/catalog_db
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY_CATALOG:-change-me-catalog}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-shared-jwt-secret-change-in-prod}
      AMQP_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@${MASTER_IP}:5673/
      EGP_TO_DZD_RATE: ${EGP_TO_DZD_RATE:-2.70}
      CONSUL_HTTP_ADDR: http://${MASTER_IP}:8501
      SERVICE_NAME: catalog-api
      SERVICE_PORT: "8000"
      SERVICE_ADDRESS: ${MY_IP}
    volumes:
      - ./catalog_service:/app
    networks:
      - pharm
    labels:
      - traefik.enable=true
      - traefik.http.routers.catalog.rule=Host(`api.localhost`) || Host(`api.localhost:8081`)
      - traefik.http.routers.catalog.entrypoints=web
      - traefik.http.services.catalog.loadbalancer.server.port=8000

  notification_service:
    build:
      context: .
      dockerfile: notification_service/Dockerfile
    environment:
      AMQP_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@${MASTER_IP}:5673/
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    volumes:
      - ./notification_service:/app
    networks:
      - pharm

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: http://${MASTER_IP}:8081
      VITE_AUTH_URL: http://${MASTER_IP}:8081
    networks:
      - pharm
    labels:
      - traefik.enable=true
      - traefik.http.routers.pharm-web.rule=Host(`${MASTER_IP}`) || Host(`localhost`) || Host(`web.localhost`) || PathPrefix(`/`)
      - traefik.http.routers.pharm-web.entrypoints=web
      - traefik.http.services.pharm-web.loadbalancer.server.port=80

networks:
  pharm:
    driver: bridge

volumes:
  pg_auth:
  pg_catalog: